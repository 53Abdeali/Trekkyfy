name: Trekkyfy - Comprehensive Testing

# Testing suite for Trekkyfy platform
# Validates AI agents, RAG service, customer support features, and diamond sales automation

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.11"
      node_version:
        required: false
        type: string
        default: "20"
      coverage_threshold:
        required: false
        type: number
        default: 0
      uv_version:
        required: false
        type: string
        default: "0.7.6"
      performance_targets:
        required: false
        type: string
        default: '{"response_time_p95": 500, "throughput_rps": 100, "memory_usage_mb": 512}'

# Cancel old runs to save compute
concurrency:
  group: testing-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  NODE_VERSION: ${{ inputs.node_version }}
  UV_VERSION: ${{ inputs.uv_version }}
  COVERAGE_THRESHOLD: ${{ inputs.coverage_threshold }}
  # Temporary: skip docker compose on runners without overlayfs support.
  SKIP_DOCKER_SERVICES: "true"
jobs:
  # Backend Testing with Coverage
  backend-testing:
    name: Backend Testing & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Test environment configuration
      ENVIRONMENT: development
      POSTGRES_DB: test_trekky
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_PORT: 5732
      REDIS_PORT: 6379
      AGENT_SERVICE_PORT: 8100
      RAG_SERVICE_PORT: 8106
      DASHBOARD_BFF_PORT: 8107
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5732/test_trekky
      OPENAI_THINKING: disabled

    outputs:
      backend_coverage: ${{ steps.coverage-summary.outputs.coverage }}
      backend_status: ${{ steps.test-summary.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: |
          if [ ! -f "$HOME/.local/bin/uv" ]; then
            curl -LsSf https://astral.sh/uv/${{ env.UV_VERSION }}/install.sh | sh
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache UV Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/bin/uv
            ~/.local/bin/uvx
          key: backend-test-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}

      - name: Install dependencies
        run: |
          uv sync --project trekkyfy-backend --all-groups
          if false; then
            # Install PyTorch CPU-only first, then other dependencies (optimized for CI)
            uv pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0.0" && uv pip install -r requirements.txt
          fi

      - name: Check for Python tests
        id: test-check
        run: |
          if find trekkyfy-backend/tests -name "test_*.py" -o -name "*_test.py" 2>/dev/null | head -1 | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "Python tests found"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No Python tests found"
          fi


      - name: Run Unit Tests
        if: steps.test-check.outputs.has_tests == 'true'
        run: |
          # Run unit tests with coverage
          set +e  # Allow command to fail without exiting script

          echo "Running unit tests..."
          uv run --project trekkyfy-backend pytest trekkyfy-backend/tests/ -v \
            --cov=config \
            --cov-report=xml:backend-coverage.xml \
            --cov-report=html:backend-htmlcov \
            --cov-report=json:backend-coverage.json \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --junit-xml=backend-unit-results.xml
          STATUS=$?

          echo "Pytest exit code: $STATUS"
          set -e  # Re-enable exit on error

          echo "UNIT_TEST_STATUS=$STATUS" >> $GITHUB_ENV

          # Explicitly fail if tests failed
          if [ $STATUS -ne 0 ]; then
            echo "Unit tests failed with exit code $STATUS"
            exit $STATUS
          fi

      - name: Start Services for Integration Tests
        if: steps.test-check.outputs.has_tests == 'true'
        run: |
          echo "::group::Starting All Services for Integration Tests"

          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping docker compose services."
            echo "::endgroup::"
            exit 0
          fi

          services=$(docker compose config --services 2>/dev/null || true)
          start_services=()
          if echo "$services" | grep -q '^postgres$'; then
            start_services+=("postgres")
          fi
          if [ ${#start_services[@]} -gt 0 ]; then
            sudo docker compose up -d "${start_services[@]}" --wait
          else
            echo "No integration test services defined in docker-compose.yml. Skipping."
          fi

          echo "Waiting for all services to be healthy (using docker compose health checks)..."
          docker compose ps
          echo "All services are ready!"
          echo "::endgroup::"

      - name: Run Integration Tests
        if: steps.test-check.outputs.has_tests == 'true'
        run: |
          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping integration tests."
            echo "INTEGRATION_TEST_STATUS=0" >> $GITHUB_ENV
            exit 0
          fi

          # Run integration tests if they exist
          if find trekkyfy-backend/tests/integration -name "test_*.py" -o -name "*_test.py" 2>/dev/null | head -1 | grep -q .; then
            set +e  # Allow command to fail without exiting script

            echo "Running integration tests..."
            uv run --project trekkyfy-backend pytest trekkyfy-backend/tests/integration/ -v \
              --cov=config \
              --cov-append \
              --cov-report=xml:backend-coverage.xml \
              --cov-report=html:backend-htmlcov \
              --cov-report=json:backend-coverage.json \
              --junit-xml=backend-integration-results.xml
            STATUS=$?

            echo "Integration pytest exit code: $STATUS"
            set -e  # Re-enable exit on error

            echo "INTEGRATION_TEST_STATUS=$STATUS" >> $GITHUB_ENV

            # Explicitly fail if tests failed
            if [ $STATUS -ne 0 ]; then
              echo "Integration tests failed with exit code $STATUS"
              exit $STATUS
            fi
          else
            echo "No integration tests found, skipping"
            echo "INTEGRATION_TEST_STATUS=0" >> $GITHUB_ENV
          fi

      - name: Cleanup Test Services
        if: always() && steps.test-check.outputs.has_tests == 'true'
        run: |
          echo "::group::Cleaning Up Test Services"
          set +e
          if [ "${ACT:-}" = "true" ]; then
            echo "ACT detected. Skipping docker image cleanup to avoid removing local images."
            docker compose down -v || true
            echo "::endgroup::"
            exit 0
          fi

          # Stop and remove all services and volumes
          docker compose down -v

          # Smart cleanup: Remove only locally built images, preserve all pulled images
          echo "Performing smart image cleanup..."

          # Get all images and identify which ones are from registries (pulled)
          # Images from registries will have a registry prefix (e.g., docker.io/, ghcr.io/, etc.)
          # or be from Docker Hub official images (no prefix but known names)

          # List all images with their full repository info
          ALL_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>")

          # Identify pulled images (from registries)
          PULLED_IMAGES=$(echo "$ALL_IMAGES" | grep -E "^(docker\.io/|ghcr\.io/|gcr\.io/|quay\.io/|registry\.|[a-zA-Z0-9.-]+\.[a-zA-Z]+/|postgres:|redis:|nginx:|node:|python:|alpine:|ubuntu:|debian:|vault:|minio:|keycloak:|grafana:|prom/|jaegertracing:|grafana/loki:|promtail:|hashicorp/)" || true)

          # Images to remove = All images - Pulled images
          TO_REMOVE=$(comm -23 <(echo "$ALL_IMAGES" | sort) <(echo "$PULLED_IMAGES" | sort) | grep -v "^$" || true)

          if [[ -n "$TO_REMOVE" ]]; then
            echo "Found locally built images to remove:"
            echo "$TO_REMOVE"
            echo "$TO_REMOVE" | xargs -r docker rmi -f || echo "Some images couldn't be removed (may be in use)"
          else
            echo "No locally built images found to remove"
          fi

          # Clean up dangling images and build cache
          docker image prune -f || true
          docker builder prune -f --filter "until=1h" || true

          echo "✅ Preserved all pulled/registry images"
          echo "🗑️  Removed only locally built images"
          echo "Test cleanup completed"
          echo "::endgroup::"

      # - name: Generate coverage badge
      #   if: steps.test-check.outputs.has_tests == 'true'
      #   run: |
      #     uv add coverage-badge
      #     uv run coverage-badge -o backend-coverage-badge.svg

      - name: Coverage Summary
        if: steps.test-check.outputs.has_tests == 'true'
        id: coverage-summary
        run: |
          if [ -f "backend-coverage.json" ]; then
            COVERAGE=$(python -c "
          import json
          with open('backend-coverage.json') as f:
              data = json.load(f)
              print(f'{data[\"totals\"][\"percent_covered\"]:.1f}')
          ")
                      echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
                      echo "Backend coverage: $COVERAGE%"
                    else
                      echo "coverage=0" >> $GITHUB_OUTPUT
                    fi

      - name: Test Summary
        id: test-summary
        if: always()
        run: |
          if [ "${{ steps.test-check.outputs.has_tests }}" == "true" ]; then
            # Check if test status variables are set (tests actually ran)
            if [ -n "$UNIT_TEST_STATUS" ] || [ -n "$INTEGRATION_TEST_STATUS" ]; then
              echo "Unit: ${UNIT_TEST_STATUS:-1}, Integration: ${INTEGRATION_TEST_STATUS:-1}"
              if [ "${UNIT_TEST_STATUS:-1}" -eq 0 ] && [ "${INTEGRATION_TEST_STATUS:-1}" -eq 0 ]; then
                echo "status=success" >> $GITHUB_OUTPUT
                echo "✅ Backend tests passed"
              else
                echo "status=failure" >> $GITHUB_OUTPUT
                echo "❌ Backend tests failed"
                exit 1  # Fail the step when tests fail
              fi
            else
              # Tests are commented out/disabled
              echo "status=skipped" >> $GITHUB_OUTPUT
              echo "⏭️ Backend tests are disabled (commented out)"
            fi
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "⏭️ No backend tests found"
          fi


      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend-coverage.xml
            backend-htmlcov/
            backend-coverage.json
            backend-coverage-badge.svg
            backend-*-results.xml

  # Frontend Testing with Coverage
  frontend-testing:
    name: Frontend Testing & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      frontend_coverage: ${{ steps.frontend-coverage.outputs.coverage }}
      frontend_status: ${{ steps.frontend-summary.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for frontend code
        id: frontend-check
        run: |
          if [ -f "trekkyfy-frontend/package.json" ] && [ -d "trekkyfy-frontend" ]; then
            echo "has_frontend=true" >> $GITHUB_OUTPUT
            echo "Frontend code found"
          else
            echo "has_frontend=false" >> $GITHUB_OUTPUT
            echo "No frontend code found"
          fi

      - name: Check for frontend test script
        id: frontend-test-check
        if: steps.frontend-check.outputs.has_frontend == 'true'
        working-directory: trekkyfy-frontend
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['test:coverage'] ? 0 : 1)"; then
            echo "has_frontend_tests=true" >> $GITHUB_OUTPUT
            echo "Frontend test:coverage script found"
          else
            echo "has_frontend_tests=false" >> $GITHUB_OUTPUT
            echo "No frontend test:coverage script found"
          fi

      - name: Set up Node.js
        if: steps.frontend-check.outputs.has_frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "trekkyfy-frontend/package-lock.json"

      - name: Install system dependencies
        if: steps.frontend-check.outputs.has_frontend == 'true'
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          elif command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache jq
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y jq
          else
            echo "⚠️ Package manager not found; ensure jq is available"
          fi

      - name: Install frontend dependencies
        if: steps.frontend-check.outputs.has_frontend == 'true'
        working-directory: trekkyfy-frontend
        run: |
          npm ci || (npm cache clean --force && npm ci)

      - name: Run frontend unit tests
        if: steps.frontend-test-check.outputs.has_frontend_tests == 'true'
        working-directory: trekkyfy-frontend
        run: |
          npm run test:coverage -- \
            --coverage \
            --coverageDirectory=coverage \
            --coverageReporters=text,lcov,json,html \
            --coverageThreshold='{"global":{"branches":${{ env.COVERAGE_THRESHOLD }},"functions":${{ env.COVERAGE_THRESHOLD }},"lines":${{ env.COVERAGE_THRESHOLD }},"statements":${{ env.COVERAGE_THRESHOLD }}}}' \
            --watchAll=false || STATUS=$?

          echo "FRONTEND_TEST_STATUS=${STATUS:-0}" >> $GITHUB_ENV

      - name: Generate frontend coverage badge
        if: steps.frontend-test-check.outputs.has_frontend_tests == 'true'
        working-directory: trekkyfy-frontend
        run: |
          npx coverage-badges-cli --source coverage/coverage-summary.json --output coverage/coverage-badge.svg

      - name: Frontend Coverage Summary
        if: steps.frontend-test-check.outputs.has_frontend_tests == 'true'
        id: frontend-coverage
        run: |
          if [ -f "trekkyfy-frontend/coverage/coverage-summary.json" ]; then
            COVERAGE=$(jq -r '.total.lines.pct' trekkyfy-frontend/coverage/coverage-summary.json)
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Frontend coverage: $COVERAGE%"
          else
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Frontend Summary
        id: frontend-summary
        if: always()
        run: |
          if [ "${{ steps.frontend-check.outputs.has_frontend }}" == "true" ]; then
            if [ "${{ steps.frontend-test-check.outputs.has_frontend_tests }}" != "true" ]; then
              echo "status=skipped" >> $GITHUB_OUTPUT
              echo "⏭️ No frontend test script found"
            elif [ "${FRONTEND_TEST_STATUS:-1}" -eq 0 ]; then
              echo "status=success" >> $GITHUB_OUTPUT
              echo "✅ Frontend tests passed"
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              echo "❌ Frontend tests failed"
            fi
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "⏭️ No frontend code found"
          fi

      - name: Upload frontend test results
        if: always() && steps.frontend-test-check.outputs.has_frontend_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            trekkyfy-frontend/coverage/

  # End-to-End Testing
  e2e-testing:
    name: End-to-End Testing
    runs-on: ubuntu-latest
    needs: [backend-testing, frontend-testing]
    if: needs.backend-testing.outputs.backend_status == 'success' && needs.frontend-testing.outputs.frontend_status != 'failure'
    timeout-minutes: 20

    env:
      # E2E Test environment configuration
      ENVIRONMENT: development
      POSTGRES_DB: test_trekky_e2e
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_PORT: 5733
      REDIS_PORT: 6379
      AGENT_SERVICE_PORT: 8200
      RAG_SERVICE_PORT: 8206
      DASHBOARD_BFF_PORT: 8207
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5733/test_trekky_e2e
      OPENAI_THINKING: disabled

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: |
          if [ ! -f "$HOME/.local/bin/uv" ]; then
            curl -LsSf https://astral.sh/uv/${{ env.UV_VERSION }}/install.sh | sh
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/bin/uv
            ~/.local/bin/uvx
          key: e2e-test-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}

      - name: Install dependencies
        run: |
          uv sync --project trekkyfy-backend --all-groups

          if false; then
            # Install PyTorch CPU-only first, then other dependencies (optimized for CI)
            uv pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0.0" && uv pip install -r requirements.txt
          fi

      - name: Check for E2E tests
        id: e2e-check
        run: |
          if find trekkyfy-backend/tests/e2e -name "test_*.py" -o -name "*_test.py" 2>/dev/null | head -1 | grep -q .; then
            echo "has_e2e=true" >> $GITHUB_OUTPUT
            echo "Backend E2E tests found"
          else
            echo "has_e2e=false" >> $GITHUB_OUTPUT
            echo "No backend E2E tests found"
          fi

      - name: Start E2E Test Services
        if: steps.e2e-check.outputs.has_e2e == 'true'
        run: |
          echo "::group::Starting All Services for E2E Tests"

          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping docker compose services."
            echo "::endgroup::"
            exit 0
          fi

          services=$(docker compose config --services 2>/dev/null || true)
          start_services=()
          if echo "$services" | grep -q '^postgres$'; then
            start_services+=("postgres")
          fi
          if [ ${#start_services[@]} -gt 0 ]; then
            sudo docker compose up -d "${start_services[@]}" --wait
          else
            echo "No E2E test services defined in docker-compose.yml. Skipping."
          fi

          echo "Waiting for all services to be healthy (using docker compose health checks)..."
          docker compose ps
          echo "All E2E services are ready!"
          echo "::endgroup::"

      - name: Run E2E tests
        if: steps.e2e-check.outputs.has_e2e == 'true'
        run: |
          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping E2E tests."
            exit 0
          fi
          if [ -d "tests/e2e" ]; then
            uv run --project trekkyfy-backend pytest tests/e2e/ -v --junit-xml=e2e-results.xml
          fi

      - name: Cleanup E2E Test Services
        if: always() && steps.e2e-check.outputs.has_e2e == 'true'
        run: |
          echo "::group::Cleaning Up E2E Test Services"
          set +e
          if [ "${ACT:-}" = "true" ]; then
            echo "ACT detected. Skipping docker image cleanup to avoid removing local images."
            docker compose down -v || true
            echo "::endgroup::"
            exit 0
          fi

          # Stop and remove all services and volumes
          docker compose down -v

          # Smart cleanup: Remove only locally built images, preserve all pulled images
          echo "Performing smart image cleanup..."

          # Get all images and identify which ones are from registries (pulled)
          # Images from registries will have a registry prefix (e.g., docker.io/, ghcr.io/, etc.)
          # or be from Docker Hub official images (no prefix but known names)

          # List all images with their full repository info
          ALL_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>")

          # Identify pulled images (from registries)
          PULLED_IMAGES=$(echo "$ALL_IMAGES" | grep -E "^(docker\.io/|ghcr\.io/|gcr\.io/|quay\.io/|registry\.|[a-zA-Z0-9.-]+\.[a-zA-Z]+/|postgres:|redis:|nginx:|node:|python:|alpine:|ubuntu:|debian:|vault:|minio:|keycloak:|grafana:|prom/|jaegertracing:|grafana/loki:|promtail:|hashicorp/)" || true)

          # Images to remove = All images - Pulled images
          TO_REMOVE=$(comm -23 <(echo "$ALL_IMAGES" | sort) <(echo "$PULLED_IMAGES" | sort) | grep -v "^$" || true)

          if [[ -n "$TO_REMOVE" ]]; then
            echo "Found locally built images to remove:"
            echo "$TO_REMOVE"
            echo "$TO_REMOVE" | xargs -r docker rmi -f || echo "Some images couldn't be removed (may be in use)"
          else
            echo "No locally built images found to remove"
          fi

          # Clean up dangling images and build cache
          docker image prune -f || true
          docker builder prune -f --filter "until=1h" || true

          echo "✅ Preserved all pulled/registry images"
          echo "🗑️  Removed only locally built images"
          echo "E2E test cleanup completed"
          echo "::endgroup::"

      - name: Upload E2E test results
        if: always() && steps.e2e-check.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-results.xml

  # Performance Testing
  performance-testing:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: [backend-testing]
    if: needs.backend-testing.outputs.backend_status == 'success'
    timeout-minutes: 15

    env:
      # Performance Test environment configuration
      ENVIRONMENT: development
      POSTGRES_DB: test_trekky_perf
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_PORT: 5734
      REDIS_PASSWORD: test_redis123
      REDIS_PORT: 6379
      AGENT_SERVICE_PORT: 8300
      RAG_SERVICE_PORT: 8306
      DASHBOARD_BFF_PORT: 8307
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5734/test_trekky_perf
      OPENAI_THINKING: disabled

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: |
          if [ ! -f "$HOME/.local/bin/uv" ]; then
            curl -LsSf https://astral.sh/uv/${{ env.UV_VERSION }}/install.sh | sh
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/bin/uv
            ~/.local/bin/uvx
          key: performance-test-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            performance-test-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          uv sync --project trekkyfy-backend --all-groups
          if false; then
            # Install PyTorch CPU-only first, then other dependencies (optimized for CI)
            uv pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0.0" && uv pip install -r requirements.txt
          fi

      - name: Install performance testing tools
        if: env.SKIP_DOCKER_SERVICES != 'true'
        run: |
          uv pip install locust

      - name: Check for performance tests
        id: perf-check
        if: env.SKIP_DOCKER_SERVICES != 'true'
        run: |
          if find trekkyfy-backend/tests -name "*performance*" -o -name "*load*" -o -name "locustfile.py" 2>/dev/null | head -1 | grep -q .; then
            echo "has_performance_tests=true" >> $GITHUB_OUTPUT
            echo "Performance tests found"
          else
            echo "has_performance_tests=false" >> $GITHUB_OUTPUT
            echo "No performance tests found, will create basic load test"
          fi


      - name: Start Performance Test Services
        if: env.SKIP_DOCKER_SERVICES != 'true' && steps.perf-check.outputs.has_performance_tests == 'true'
        run: |
          echo "::group::Starting Performance Test Services with Docker Compose"

          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping docker compose services."
            echo "::endgroup::"
            exit 0
          fi

          services=$(docker compose config --services 2>/dev/null || true)
          if echo "$services" | grep -q '^postgres$'; then
            sudo docker compose up -d postgres --wait
          else
            echo "No performance test services defined in docker-compose.yml. Skipping."
          fi

          echo "Waiting for all services to be healthy (using docker compose health checks)..."
          docker compose ps
          echo "Performance test infrastructure is ready!"
          echo "::endgroup::"

      - name: Start services for performance testing
        if: env.SKIP_DOCKER_SERVICES != 'true' && steps.perf-check.outputs.has_performance_tests == 'true'
        run: |
          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping performance tests."
            exit 0
          fi
          # Start Agent Service for performance testing
          if [ -f "trekkyfy-backend/services/agent_service/main.py" ]; then
            echo "Starting agent_service for performance testing"
            uv run uvicorn src.services.agent_service.main:app \
              --host 0.0.0.0 --port $AGENT_SERVICE_PORT &
            echo $! > "/tmp/agent_service_pid"
            sleep 30
            curl -f http://localhost:$AGENT_SERVICE_PORT/health || echo "Health check failed"
          else
            echo "Agent Service not found, skipping performance tests"
            exit 0
          fi

      - name: Run load tests
        if: env.SKIP_DOCKER_SERVICES != 'true' && steps.perf-check.outputs.has_performance_tests == 'true'
        run: |
          if [ "${SKIP_DOCKER_SERVICES:-false}" = "true" ]; then
            echo "SKIP_DOCKER_SERVICES=true; skipping load tests."
            exit 0
          fi
          if [ -f "/tmp/agent_service_pid" ]; then
            # Find performance test file
            PERF_FILE=$(find trekkyfy-backend/tests/performance -name "*.py" | head -1)

            if [ -n "$PERF_FILE" ]; then
              echo "Running performance tests with $PERF_FILE"
              uv run locust -f "$PERF_FILE" \
                --headless \
                --users 3 \
                --spawn-rate 1 \
                --run-time 30s \
                --host http://localhost:$AGENT_SERVICE_PORT \
                --html performance-report.html \
                --csv performance-results
            else
              echo "No performance test file found"
            fi
          else
            echo "No API service running, skipping performance tests"
          fi

      - name: Analyze performance results
        run: |
          if [ -f "performance-results_stats.csv" ]; then
            echo "Performance test completed - results available in artifacts"
          else
            echo "No performance results found"
          fi

      - name: Cleanup services
        if: always()
        run: |
          # Clean up application services
          if [ -f "/tmp/agent_service_pid" ]; then
            PID=$(cat "/tmp/agent_service_pid")
            kill "$PID" 2>/dev/null || true
            rm -f "/tmp/agent_service_pid"
          fi

      - name: Cleanup Performance Test Services
        if: always()
        run: |
          echo "::group::Cleaning Up Performance Test Services"
          set +e
          if [ "${ACT:-}" = "true" ]; then
            echo "ACT detected. Skipping docker image cleanup to avoid removing local images."
            docker compose down -v || true
            echo "::endgroup::"
            exit 0
          fi

          # Stop and remove all services and volumes
          docker compose down -v

          # Smart cleanup: Remove only locally built images, preserve all pulled images
          echo "Performing smart image cleanup..."

          # Get all images and identify which ones are from registries (pulled)
          # Images from registries will have a registry prefix (e.g., docker.io/, ghcr.io/, etc.)
          # or be from Docker Hub official images (no prefix but known names)

          # List all images with their full repository info
          ALL_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>")

          # Identify pulled images (from registries)
          PULLED_IMAGES=$(echo "$ALL_IMAGES" | grep -E "^(docker\.io/|ghcr\.io/|gcr\.io/|quay\.io/|registry\.|[a-zA-Z0-9.-]+\.[a-zA-Z]+/|postgres:|redis:|nginx:|node:|python:|alpine:|ubuntu:|debian:|vault:|minio:|keycloak:|grafana:|prom/|jaegertracing:|grafana/loki:|promtail:|hashicorp/)" || true)

          # Images to remove = All images - Pulled images
          TO_REMOVE=$(comm -23 <(echo "$ALL_IMAGES" | sort) <(echo "$PULLED_IMAGES" | sort) | grep -v "^$" || true)

          if [[ -n "$TO_REMOVE" ]]; then
            echo "Found locally built images to remove:"
            echo "$TO_REMOVE"
            echo "$TO_REMOVE" | xargs -r docker rmi -f || echo "Some images couldn't be removed (may be in use)"
          else
            echo "No locally built images found to remove"
          fi

          # Clean up dangling images and build cache
          docker image prune -f || true
          docker builder prune -f --filter "until=1h" || true

          echo "✅ Preserved all pulled/registry images"
          echo "🗑️  Removed only locally built images"
          echo "Performance test cleanup completed"
          echo "::endgroup::"

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: |
            performance-report.html
            performance-results*.csv
            performance-summary.json

  # Testing Summary
  testing-summary:
    name: Testing Summary
    runs-on: ubuntu-latest
    needs: [backend-testing, frontend-testing, e2e-testing, performance-testing]
    if: always()
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4

      - name: Generate comprehensive testing summary
        run: |
          echo "# Comprehensive Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Test Results Overview:" >> $GITHUB_STEP_SUMMARY

          # Backend Testing
          case "${{ needs.backend-testing.outputs.backend_status }}" in
            "success")
              echo "- ✅ **Backend Testing**: All tests passed (Coverage: ${{ needs.backend-testing.outputs.backend_coverage }}%)" >> $GITHUB_STEP_SUMMARY ;;
            "failure")
              echo "- ❌ **Backend Testing**: Tests failed" >> $GITHUB_STEP_SUMMARY ;;
            "skipped")
              echo "- ⏭️ **Backend Testing**: No tests found" >> $GITHUB_STEP_SUMMARY ;;
            *)
              echo "- ❓ **Backend Testing**: Status unknown" >> $GITHUB_STEP_SUMMARY ;;
          esac

          # Frontend Testing
          case "${{ needs.frontend-testing.outputs.frontend_status }}" in
            "success")
              echo "- ✅ **Frontend Testing**: All tests passed (Coverage: ${{ needs.frontend-testing.outputs.frontend_coverage }}%)" >> $GITHUB_STEP_SUMMARY ;;
            "failure")
              echo "- ❌ **Frontend Testing**: Tests failed" >> $GITHUB_STEP_SUMMARY ;;
            "skipped")
              echo "- ⏭️ **Frontend Testing**: No frontend code found" >> $GITHUB_STEP_SUMMARY ;;
            *)
              echo "- ❓ **Frontend Testing**: Status unknown" >> $GITHUB_STEP_SUMMARY ;;
          esac

          # E2E Testing
          case "${{ needs.e2e-testing.result }}" in
            "success")
              echo "- ✅ **End-to-End Testing**: All tests passed" >> $GITHUB_STEP_SUMMARY ;;
            "failure")
              echo "- ❌ **End-to-End Testing**: Tests failed" >> $GITHUB_STEP_SUMMARY ;;
            "skipped")
              echo "- ⏭️ **End-to-End Testing**: Skipped or no E2E tests found" >> $GITHUB_STEP_SUMMARY ;;
            *)
              echo "- ❓ **End-to-End Testing**: Status unknown" >> $GITHUB_STEP_SUMMARY ;;
          esac

          # Performance Testing
          case "${{ needs.performance-testing.result }}" in
            "success")
              echo "- ✅ **Performance Testing**: Completed successfully" >> $GITHUB_STEP_SUMMARY ;;
            "failure")
              echo "- ❌ **Performance Testing**: Failed" >> $GITHUB_STEP_SUMMARY ;;
            "skipped")
              echo "- ⏭️ **Performance Testing**: Skipped" >> $GITHUB_STEP_SUMMARY ;;
            *)
              echo "- ❓ **Performance Testing**: Status unknown" >> $GITHUB_STEP_SUMMARY ;;
          esac

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage Summary:" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Threshold**: ${{ env.COVERAGE_THRESHOLD }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Coverage**: ${{ needs.backend-testing.outputs.backend_coverage }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Coverage**: ${{ needs.frontend-testing.outputs.frontend_coverage }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- Backend test results and coverage reports" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend test results and coverage reports" >> $GITHUB_STEP_SUMMARY
          echo "- End-to-end test results and screenshots" >> $GITHUB_STEP_SUMMARY
          echo "- Performance test reports and metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All testing phases have been completed. Review detailed reports in the artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Final Testing Status
        run: |
          # Determine overall testing status
          BACKEND_STATUS="${{ needs.backend-testing.outputs.backend_status }}"
          FRONTEND_STATUS="${{ needs.frontend-testing.outputs.frontend_status }}"
          E2E_STATUS="${{ needs.e2e-testing.result }}"
          PERFORMANCE_STATUS="${{ needs.performance-testing.result }}"

          # Convert GitHub job results to consistent status format
          # GitHub results: success, failure, cancelled, skipped
          # Our format: success, failure, skipped
          case "$E2E_STATUS" in
            "success") E2E_STATUS="success" ;;
            "failure") E2E_STATUS="failure" ;;
            "cancelled"|"skipped") E2E_STATUS="skipped" ;;
            *) E2E_STATUS="skipped" ;;
          esac

          case "$PERFORMANCE_STATUS" in
            "success") PERFORMANCE_STATUS="success" ;;
            "failure") PERFORMANCE_STATUS="failure" ;;
            "cancelled"|"skipped") PERFORMANCE_STATUS="skipped" ;;
            *) PERFORMANCE_STATUS="skipped" ;;
          esac

          echo "=== Test Status Summary ==="
          echo "Backend: $BACKEND_STATUS, Frontend: $FRONTEND_STATUS, E2E: $E2E_STATUS, Performance: $PERFORMANCE_STATUS"

          # Check for failures (only count actual failures, not skipped tests)
          FAILED=false
          FAILED_COMPONENTS=()

          if [ "$BACKEND_STATUS" == "failure" ]; then
            FAILED=true
            FAILED_COMPONENTS+=("Backend")
          fi
          if [ "$FRONTEND_STATUS" == "failure" ]; then
            FAILED=true
            FAILED_COMPONENTS+=("Frontend")
          fi
          if [ "$E2E_STATUS" == "failure" ]; then
            FAILED=true
            FAILED_COMPONENTS+=("E2E")
          fi
          if [ "$PERFORMANCE_STATUS" == "failure" ]; then
            FAILED=true
            FAILED_COMPONENTS+=("Performance")
          fi

          # Special case: if all tests are skipped, that's still a pass
          if [ "$BACKEND_STATUS" == "skipped" ] && [ "$FRONTEND_STATUS" == "skipped" ] && [ "$E2E_STATUS" == "skipped" ] && [ "$PERFORMANCE_STATUS" == "skipped" ]; then
            echo "⚠️ All tests were skipped - no test files found"
            echo "This is considered a pass, but you may want to add tests"
            exit 0
          fi

          if [ "$FAILED" == "true" ]; then
            echo "❌ Comprehensive Testing Failed"
            echo "Failed components: ${FAILED_COMPONENTS[*]}"
            echo "Note: Skipped tests do not cause failure"
            exit 1
          else
            echo "✅ Comprehensive Testing Passed"
            echo "All executed tests passed (skipped tests are ignored)"
          fi
