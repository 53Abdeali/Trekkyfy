name: Trekkyfy - Security & Compliance

# Security scanning and compliance validation for Trekkyfy platform
# Ensures AI-powered diamond sales platform meets security and data protection standards

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.11"
      node_version:
        required: false
        type: string
        default: "20"
      uv_version:
        required: false
        type: string
        default: "0.7.6"
      compliance_frameworks:
        required: false
        type: string
        default: '["HIPAA", "SOC2", "GDPR", "PCI-DSS"]'

# Cancel old runs to save compute
concurrency:
  group: security-compliance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  NODE_VERSION: ${{ inputs.node_version }}
  UV_VERSION: ${{ inputs.uv_version }}
  COMPLIANCE_FRAMEWORKS: ${{ inputs.compliance_frameworks }}

jobs:
  # Comprehensive Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install UV
        run: |
          if [ ! -f "$HOME/.local/bin/uv" ]; then
            curl -LsSf https://astral.sh/uv/${{ env.UV_VERSION }}/install.sh | sh
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y wget tar
          elif command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache wget tar
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y wget tar
          else
            echo "⚠️ Package manager not found; ensure wget/tar are available"
          fi

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/bin/uv
            ~/.local/bin/uvx
          key: security-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}

      - name: Install minimal dependencies for security scanning
        run: |
          # Only install dev dependencies needed for security tools
          uv sync --project trekkyfy-backend --all-groups

      # Secret Detection
      - name: Secret Detection (Gitleaks)
        id: secrets
        run: |
          # Install Gitleaks
          VERSION="8.21.2"
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${VERSION}_linux_x64.tar.gz
          chmod +x gitleaks

          # Run secret scan
          ./gitleaks detect --source . --verbose --log-opts=-n12 --no-banner --report-format json --report-path gitleaks-report.json || FOUND_SECRETS=true

          if [ "$FOUND_SECRETS" = "true" ]; then
            echo "❌ CRITICAL: Secrets detected in codebase"
            cat gitleaks-report.json
            exit 1
          else
            echo "✅ No secrets detected"
          fi

      # Python Security Analysis
      - name: Python Security Scan (Bandit)
        run: |
          uv run --project trekkyfy-backend bandit -r trekkyfy-backend/ -f json -o bandit-report.json -ll || STATUS=$?

          if [ "${STATUS:-0}" -ne 0 ]; then
            echo "❌ Security vulnerabilities found"
            cat bandit-report.json
            exit 1
          else
            echo "✅ No security issues found"
          fi


      - name: Frontend Security Scan
        run: |
          if [ -f "trekkyfy-frontend/package.json" ]; then
            cd trekkyfy-frontend
            npm ci || (npm cache clean --force && npm ci)
            STATUS=0

            # Audit runtime deps only. Dev-tooling vulnerabilities are tracked separately.
            npm audit --omit=dev --audit-level=moderate --json > ../npm-audit-report.json || STATUS=$?

            if [ "${STATUS:-0}" -ne 0 ]; then
              echo "❌ Frontend security vulnerabilities found"
              cat ../npm-audit-report.json
              exit 1
            else
              echo "✅ No frontend security vulnerabilities"
            fi

            cd ..
          else
            echo "⏭️ No frontend code found, skipping frontend security scan"
          fi

      # Infrastructure as Code Security
      - name: Infrastructure Security Scan (Checkov)
        run: |
          uv pip install checkov

          # Scan infrastructure files
          uv run checkov -f docker-compose.yml --framework docker_compose --output json --output-file checkov-docker-compose.json || true
          uv run checkov -d . --framework dockerfile --output json --output-file checkov-dockerfile.json || true
          uv run checkov -d .github/workflows --framework github_actions --output json --output-file checkov-github-actions.json || true

          echo "✅ Infrastructure security scan completed"

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            gitleaks-report.json
            bandit-report.json
            safety-report.json
            npm-audit-report.json
            trivy-*.json
            checkov-*.json

  # Comprehensive Compliance Validation
  compliance-validation:
    name: Compliance Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # License Compliance Check
      - name: License Compliance Check
        run: |
          echo "# License Compliance Report" > license-compliance-report.md
          echo "" >> license-compliance-report.md

          # Python license check
          if [ -f "trekkyfy-backend/pyproject.toml" ]; then
            pip install pip-licenses
            pip-licenses --format=json --output-file=python-licenses.json

            # Check for problematic licenses
            PROBLEMATIC=$(pip-licenses --format=plain --fail-on="GPL v3;AGPL v3;CPAL v1.0;CPOL v1.02" 2>&1 || echo "problematic_found")

            if echo "$PROBLEMATIC" | grep -q "problematic_found"; then
              echo "❌ Problematic Python licenses found" >> license-compliance-report.md
            else
              echo "✅ Python license compliance passed" >> license-compliance-report.md
            fi
          fi

          # Frontend license check
          if [ -f "trekkyfy-frontend/package.json" ]; then
            cd trekkyfy-frontend
            npm ci || (npm cache clean --force && npm ci)
            npx license-checker --json --out ../frontend-licenses.json

            # Check for problematic licenses
            PROBLEMATIC_FRONTEND=$(npx license-checker --excludePackages "GPL*,AGPL*,CPAL*,CPOL*,EPL*" --summary 2>&1 || echo "problematic_found")

            if echo "$PROBLEMATIC_FRONTEND" | grep -q "problematic_found"; then
              echo "❌ Problematic frontend licenses found" >> ../license-compliance-report.md
            else
              echo "✅ Frontend license compliance passed" >> ../license-compliance-report.md
            fi
            cd ..
          fi

      # HIPAA Compliance Assessment
      - name: HIPAA Compliance Assessment
        run: |
          echo "# HIPAA Compliance Assessment" > hipaa-compliance-report.md
          echo "" >> hipaa-compliance-report.md

          python << 'EOF'
          import os
          import re

          hipaa_requirements = {
              'encryption_at_rest': False,
              'encryption_in_transit': False,
              'access_controls': False,
              'audit_logging': False,
              'user_authentication': False,
              'data_backup': False,
              'incident_response': False
          }

          # Search for HIPAA compliance indicators
          all_files = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith(('.py', '.yml', '.yaml', '.md', '.env.example')):
                      all_files.append(os.path.join(root, file))

          for file_path in all_files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read().lower()

                      # Check for encryption indicators
                      if any(term in content for term in ['encrypt', 'ssl', 'tls', 'aes', 'rsa']):
                          if 'database' in content or 'at-rest' in content or 'at_rest' in content:
                              hipaa_requirements['encryption_at_rest'] = True
                          if 'transport' in content or 'https' in content or 'ssl' in content:
                              hipaa_requirements['encryption_in_transit'] = True

                      # Check for access controls
                      if any(term in content for term in ['auth', 'permission', 'role', 'rbac']):
                          hipaa_requirements['access_controls'] = True
                          hipaa_requirements['user_authentication'] = True

                      # Check for audit logging
                      if 'audit' in content and 'log' in content:
                          hipaa_requirements['audit_logging'] = True

                      # Check for backup procedures
                      if 'backup' in content or 'recovery' in content:
                          hipaa_requirements['data_backup'] = True

                      # Check for incident response
                      if 'incident' in content and ('response' in content or 'breach' in content):
                          hipaa_requirements['incident_response'] = True

              except:
                  continue

          print("## HIPAA Compliance Status:")
          compliant_count = sum(hipaa_requirements.values())
          total_requirements = len(hipaa_requirements)

          for requirement, compliant in hipaa_requirements.items():
              status = '✅' if compliant else '❌'
              print(f"- {status} {requirement.replace('_', ' ').title()}: {compliant}")

          compliance_percentage = (compliant_count / total_requirements) * 100
          print(f"\nHIPAA Compliance Score: {compliance_percentage:.1f}% ({compliant_count}/{total_requirements})")

          if compliance_percentage >= 70:
              print("✅ HIPAA compliance requirements appear to be adequately addressed")
          else:
              print("⚠️ Additional HIPAA compliance measures may be needed")
          EOF

          echo "HIPAA assessment completed" >> hipaa-compliance-report.md

      # SOC2 Compliance Assessment
      - name: SOC2 Compliance Assessment
        run: |
          echo "# SOC2 Compliance Assessment" > soc2-compliance-report.md
          echo "" >> soc2-compliance-report.md

          python << 'EOF'
          import os

          soc2_controls = {
              'security_controls': {
                  'access_controls': False,
                  'authentication_mechanisms': False,
                  'encryption_standards': False,
                  'vulnerability_management': False
              },
              'availability_controls': {
                  'monitoring_systems': False,
                  'incident_response': False,
                  'backup_procedures': False,
                  'capacity_planning': False
              },
              'processing_integrity': {
                  'data_validation': False,
                  'error_handling': False,
                  'transaction_processing': False
              },
              'confidentiality': {
                  'data_classification': False,
                  'access_restrictions': False,
                  'secure_disposal': False
              }
          }

          # Scan for SOC2 compliance indicators
          all_files = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith(('.py', '.yml', '.yaml', '.md', '.json')):
                      all_files.append(os.path.join(root, file))

          compliance_keywords = {
              'security_controls': ['auth', 'encrypt', 'secure', 'access_control', 'vulnerability'],
              'availability_controls': ['monitor', 'alert', 'backup', 'incident', 'capacity'],
              'processing_integrity': ['validate', 'error', 'transaction', 'integrity'],
              'confidentiality': ['classify', 'restrict', 'disposal', 'confidential']
          }

          for file_path in all_files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read().lower()
                      for category, keywords in compliance_keywords.items():
                          for keyword in keywords:
                              if keyword in content:
                                  # Mark relevant controls as found
                                  for control in soc2_controls[category]:
                                      if keyword in control or any(k in control for k in keyword.split('_')):
                                          soc2_controls[category][control] = True
              except:
                  continue

          print("## SOC2 Compliance Assessment:")
          total_controls = 0
          passed_controls = 0

          for category, controls in soc2_controls.items():
              print(f"\n### {category.replace('_', ' ').title()}:")
              for control, passed in controls.items():
                  total_controls += 1
                  if passed:
                      passed_controls += 1
                  status = '✅' if passed else '❌'
                  print(f"- {status} {control.replace('_', ' ').title()}")

          compliance_percentage = (passed_controls / total_controls) * 100
          print(f"\nSOC2 Compliance Score: {compliance_percentage:.1f}% ({passed_controls}/{total_controls} controls)")

          if compliance_percentage >= 70:
              print("✅ SOC2 compliance requirements appear to be adequately addressed")
          else:
              print("⚠️ Additional SOC2 compliance controls may be needed")
          EOF

          echo "SOC2 assessment completed" >> soc2-compliance-report.md

      # GDPR Compliance Assessment
      - name: GDPR Compliance Assessment
        run: |
          echo "# GDPR Compliance Assessment" > gdpr-compliance-report.md
          echo "" >> gdpr-compliance-report.md

          python << 'EOF'
          import os

          gdpr_requirements = {
              'lawful_basis': False,
              'consent_management': False,
              'data_minimization': False,
              'right_to_erasure': False,
              'right_to_rectification': False,
              'right_to_portability': False,
              'data_protection_by_design': False,
              'privacy_impact_assessment': False,
              'data_breach_notification': False
          }

          # Search for GDPR compliance indicators
          all_files = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith(('.py', '.md', '.yml', '.yaml', '.json')):
                      all_files.append(os.path.join(root, file))

          gdpr_keywords = {
              'lawful_basis': ['lawful', 'basis', 'legal_basis'],
              'consent_management': ['consent', 'opt-in', 'opt-out', 'withdraw'],
              'data_minimization': ['minimize', 'minimal', 'necessary', 'purpose_limitation'],
              'right_to_erasure': ['erasure', 'delete', 'forget', 'remove_data'],
              'right_to_rectification': ['rectify', 'correct', 'update', 'modify'],
              'right_to_portability': ['portability', 'export', 'transfer', 'download'],
              'data_protection_by_design': ['privacy_by_design', 'protection_by_design', 'privacy_default'],
              'privacy_impact_assessment': ['pia', 'privacy_impact', 'dpia'],
              'data_breach_notification': ['breach', 'incident', 'notification', 'breach_response']
          }

          for file_path in all_files:
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read().lower()
                      for requirement, keywords in gdpr_keywords.items():
                          for keyword in keywords:
                              if keyword in content:
                                  gdpr_requirements[requirement] = True
                                  break
              except:
                  continue

          print("## GDPR Compliance Assessment:")
          compliant_count = sum(gdpr_requirements.values())
          total_requirements = len(gdpr_requirements)

          for requirement, compliant in gdpr_requirements.items():
              status = '✅' if compliant else '❌'
              print(f"- {status} {requirement.replace('_', ' ').title()}: {compliant}")

          compliance_percentage = (compliant_count / total_requirements) * 100
          print(f"\nGDPR Compliance Score: {compliance_percentage:.1f}% ({compliant_count}/{total_requirements} requirements)")

          if compliance_percentage >= 60:
              print("✅ GDPR compliance requirements appear to be adequately addressed")
          else:
              print("⚠️ Additional GDPR compliance measures may be needed")
          EOF

          echo "GDPR assessment completed" >> gdpr-compliance-report.md

      # Documentation Compliance
      - name: Documentation Compliance Check
        run: |
          echo "# Documentation Compliance Check" > documentation-compliance-report.md
          echo "" >> documentation-compliance-report.md

          # Check for required compliance documents
          required_docs=(
            "README.md"
            "SECURITY.md"
            "PRIVACY.md"
            "CLAUDE.md"
          )

          recommended_docs=(
            "COMPLIANCE.md"
            "ARCHITECTURE.md"
            "CONTRIBUTING.md"
          )

          echo "## Required Documentation:" >> documentation-compliance-report.md
          missing_required=0
          for doc in "${required_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "- ✅ $doc" >> documentation-compliance-report.md
            else
              echo "- ❌ $doc (MISSING)" >> documentation-compliance-report.md
              missing_required=$((missing_required + 1))
            fi
          done

          echo "" >> documentation-compliance-report.md
          echo "## Recommended Documentation:" >> documentation-compliance-report.md
          missing_recommended=0
          for doc in "${recommended_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "- ✅ $doc" >> documentation-compliance-report.md
            else
              echo "- ⚠️ $doc (recommended)" >> documentation-compliance-report.md
              missing_recommended=$((missing_recommended + 1))
            fi
          done

          echo "" >> documentation-compliance-report.md
          echo "## Summary:" >> documentation-compliance-report.md
          echo "- Required documents missing: $missing_required" >> documentation-compliance-report.md
          echo "- Recommended documents missing: $missing_recommended" >> documentation-compliance-report.md

          if [ $missing_required -eq 0 ]; then
            echo "- **Status**: ✅ COMPLIANT" >> documentation-compliance-report.md
          else
            echo "- **Status**: ❌ NON-COMPLIANT" >> documentation-compliance-report.md
          fi

      - name: Upload compliance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports
          path: |
            license-compliance-report.md
            hipaa-compliance-report.md
            soc2-compliance-report.md
            gdpr-compliance-report.md
            documentation-compliance-report.md
            python-licenses.json
            frontend-licenses.json

  # Security & Compliance Summary
  security-compliance-summary:
    name: Security & Compliance Summary
    runs-on: ubuntu-latest
    needs: [security-scan, compliance-validation]
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate comprehensive summary
        run: |
          echo "# Security & Compliance Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Security Scans Completed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Detection (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Python Security Analysis (Bandit)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Vulnerability Scanning" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Static Application Security Testing (CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container Security Scanning (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Infrastructure Security (Checkov)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Compliance Validations:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ License Compliance Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ HIPAA Compliance Assessment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SOC2 Compliance Validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GDPR Compliance Assessment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Documentation Compliance Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Compliance Frameworks:" >> $GITHUB_STEP_SUMMARY
          echo "- **HIPAA**: Healthcare data protection requirements" >> $GITHUB_STEP_SUMMARY
          echo "- **SOC2**: Security, availability, and confidentiality controls" >> $GITHUB_STEP_SUMMARY
          echo "- **GDPR**: European data protection and privacy regulations" >> $GITHUB_STEP_SUMMARY
          echo "- **PCI-DSS**: Payment card industry security standards" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- Review detailed security and compliance reports in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Address any identified vulnerabilities or compliance gaps" >> $GITHUB_STEP_SUMMARY
          echo "- Consider implementing additional security controls as needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security and compliance checks have been completed successfully." >> $GITHUB_STEP_SUMMARY

      - name: Final Security & Compliance Status
        run: |
          # Check job statuses
          SECURITY_STATUS="${{ needs.security-scan.result }}"
          COMPLIANCE_STATUS="${{ needs.compliance-validation.result }}"

          if [ "$SECURITY_STATUS" == "success" ] && [ "$COMPLIANCE_STATUS" == "success" ]; then
            echo "✅ Security & Compliance Gate Passed"
          else
            echo "❌ Security & Compliance Gate Failed"
            echo "Security Scan: $SECURITY_STATUS"
            echo "Compliance Validation: $COMPLIANCE_STATUS"
            exit 1
          fi
